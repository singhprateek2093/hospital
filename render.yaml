# ============================================================================
#  Render Blueprint — deploys the whole stack from this GitHub repo.
#
#  Render reads this file and creates THREE things:
#    1. hospital-db  : managed PostgreSQL database
#    2. hospital-api : Spring Boot backend (built from the root Dockerfile)
#    3. hospital-ui  : React frontend served as a static site (Vite build)
#
#  HOW TO DEPLOY:
#    1. Push this repo to GitHub.
#    2. On https://render.com → New → "Blueprint" → pick your repo.
#    3. Render detects this file and provisions all three. Click Apply.
#
#  IMPORTANT — the URLs below assume the service names stay as-is, giving:
#      backend : https://hospital-api.onrender.com
#      frontend: https://hospital-ui.onrender.com
#  If Render appends a suffix (name already taken), update the two URL values
#  marked below to match your actual URLs, then redeploy.
# ============================================================================
databases:
  - name: hospital-db
    databaseName: hospital_db
    user: hospital
    plan: free

services:
  # ---------- Backend (Spring Boot, Docker) ----------
  - type: web
    name: hospital-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      # DB connection — pulled automatically from the managed database above.
      - key: PGHOST
        fromDatabase: { name: hospital-db, property: host }
      - key: PGPORT
        fromDatabase: { name: hospital-db, property: port }
      - key: PGDATABASE
        fromDatabase: { name: hospital-db, property: database }
      - key: PGUSER
        fromDatabase: { name: hospital-db, property: user }
      - key: PGPASSWORD
        fromDatabase: { name: hospital-db, property: password }
      # Strong random JWT signing secret, generated once by Render.
      - key: JWT_SECRET
        generateValue: true
      # Allow the frontend origin to call this API (CORS).
      # 👇 update if your frontend URL differs
      - key: CORS_ORIGINS
        value: https://hospital-ui.onrender.com

  # ---------- Frontend (React, static site) ----------
  - type: web
    name: hospital-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Point the UI at the backend's public URL (baked in at build time).
      # 👇 update if your backend URL differs
      - key: VITE_API_BASE_URL
        value: https://hospital-api.onrender.com
    routes:
      # Single-page-app fallback: every path serves index.html so React Router works.
      - type: rewrite
        source: /*
        destination: /index.html
